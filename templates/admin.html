<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Signal Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 24px; padding: 40px;
            max-width: 420px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo h1 {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .logo p { color: #6b7280; font-size: 13px; }

        .status-row { text-align: center; margin-bottom: 24px; }
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
        }
        .badge.offline { background: rgba(239,68,68,0.1); color: #dc2626; }
        .badge.online  { background: rgba(34,197,94,0.1);  color: #16a34a; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .field { margin-bottom: 18px; }
        .field label { display: block; margin-bottom: 7px; color: #374151; font-size: 13px; font-weight: 500; }
        .field input {
            width: 100%; padding: 13px 15px;
            background: #f9fafb; border: 1.5px solid #e5e7eb;
            border-radius: 12px; font-size: 14px; color: #111827; transition: all 0.2s;
        }
        .field input:focus { outline: none; border-color: #667eea; background: white; }

        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 12px; color: white;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            margin-top: 4px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.35); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            margin-top: 14px; padding: 11px 15px; border-radius: 10px;
            font-size: 13px; display: none;
        }
        .alert.error   { background: rgba(239,68,68,0.1);  color: #dc2626; border: 1px solid rgba(239,68,68,0.2); }
        .alert.success { background: rgba(34,197,94,0.1);  color: #16a34a; border: 1px solid rgba(34,197,94,0.2); }
        .alert.info    { background: rgba(59,130,246,0.1); color: #1d4ed8; border: 1px solid rgba(59,130,246,0.2); }

        .note {
            margin-top: 18px; padding: 11px 14px;
            background: #f0f4ff; border: 1px solid #c7d2fe;
            border-radius: 10px; font-size: 12px; color: #4338ca; line-height: 1.6;
        }
        .links { margin-top: 18px; text-align: center; }
        .links a { color: #667eea; text-decoration: none; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🔐 Admin Panel</h1>
        <p>Signal Generator Control</p>
    </div>

    <div class="status-row">
        <div id="badge" class="badge offline">
            <span class="dot"></span><span id="badgeText">System Offline</span>
        </div>
    </div>

    <div class="field">
        <label>Quotex Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Quotex Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn" onclick="doLogin()">Connect to Quotex</button>

    <div id="alert" class="alert"></div>

    <div class="note">
        🔄 Connecting through proxy rotation — tries up to 10 proxies automatically.
        This may take 30–60 seconds on first login.
    </div>

    <div class="links"><a href="/">← Back to Dashboard</a></div>
</div>

<script>
    async function checkStatus() {
        try {
            const data = await (await fetch('/api/admin/status')).json();
            const badge    = document.getElementById('badge');
            const badgeTxt = document.getElementById('badgeText');
            if (data.connected) {
                badge.className    = 'badge online';
                badgeTxt.textContent = 'System Online';
            } else {
                badge.className    = 'badge offline';
                badgeTxt.textContent = 'System Offline';
            }
        } catch(e) {}
    }
    checkStatus();
    setInterval(checkStatus, 5000);

    async function doLogin() {
        const btn      = document.getElementById('btn');
        const alertEl  = document.getElementById('alert');
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            alertEl.className   = 'alert error';
            alertEl.textContent = '✗ Email and password required';
            alertEl.style.display = 'block';
            return;
        }

        btn.disabled    = true;
        btn.innerHTML   = '<span class="spinner"></span>Connecting via proxy...';
        alertEl.className   = 'alert info';
        alertEl.textContent = '⏳ Trying proxies... this may take up to 60 seconds';
        alertEl.style.display = 'block';

        try {
            const res  = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                alertEl.className   = 'alert success';
                alertEl.textContent = '✓ ' + data.message + ' — Redirecting...';
                setTimeout(() => window.location.href = '/', 1500);
            } else {
                alertEl.className   = 'alert error';
                alertEl.textContent = '✗ ' + data.message;
                btn.disabled  = false;
                btn.innerHTML = 'Connect to Quotex';
            }
        } catch(e) {
            alertEl.className   = 'alert error';
            alertEl.textContent = '✗ Network error — try again';
            btn.disabled  = false;
            btn.innerHTML = 'Connect to Quotex';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>
